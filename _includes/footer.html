<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">

    <h2 class="footer-heading">{{ site.title | escape }}</h2>

    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <ul class="contact-list">
          <li class="p-name">
            {%- if site.email -%}
            <li>Contact:</li>
            <li><a class="u-email small" href="mailto:{{ site.email }}">{{ site.email }}</a></li>
            {%- endif -%}
        </ul>
      </div>

      <div class="footer-col footer-col-2">
        {%- include social.html -%}
      </div>

      <div class="footer-col footer-col-3">
        <p>{{- site.description | escape -}}</p>
      </div>
    </div>

  </div>
</footer>
<script src="/assets/bootstrap-5.0.2/js/bootstrap.min.js"></script>
  <script>
    // Wait for the DOM to fully load
    document.addEventListener("DOMContentLoaded", () => {
      // Add an event listener to all code fence copy buttons (created via CSS ::before)
      document.querySelectorAll('div.highlight').forEach(block => {
        block.addEventListener('click', (e) => {
          if (e.target === block && window.getComputedStyle(block, '::before').content !== 'none') {
            const code = block.querySelector('code').textContent;
            navigator.clipboard.writeText(code).then(() => {
              block.setAttribute('data-copied', 'true');
              setTimeout(() => block.removeAttribute('data-copied'), 2000);
            }).catch(err => console.error('Failed to copy:', err));
          }
        });
      });
    });
  </script>
